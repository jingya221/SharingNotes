# 1.2 `library(tidyverse)` 输出解释


``` r
library(tidyverse)
```

&lt;img src="image-1.png" width="40%" style="display: block; margin: auto;" /&gt;

加载后输出的三个关键部分：

.pull-left[
### ① Attaching core tidyverse packages
列出当前自动附加到搜索路径的**核心包**和**版本号**。

### ② Conflicts（冲突提示）
```
dplyr::filter() masks stats::filter()
dplyr::lag()    masks stats::lag()
```
同名函数冲突：会"遮盖"base/stats里的同名函数。

### ③ Use the conflicted package…
建议安装 `conflicted` 把冲突从"提示"升级为"必须显式选择"。
]

.pull-right[
### 处理冲突：conflicted 包


``` r
install.packages("conflicted")
library(conflicted)

# 一次声明多个偏好
conflicts_prefer(dplyr::filter, dplyr::lag)

# 也可以逐个声明
conflicts_prefer("filter", "dplyr")
conflicts_prefer("lag", "dplyr")
```

.warn-box[
`stats::filter()` 是时间序列函数；`dplyr::filter()` 是行过滤函数。**同名不同物**，务必注意！
]
]

# 1.2 管道操作符 Pipe

.pull-left[
### 两种管道写法


``` r
# magrittr 管道 %&gt;%
df %&gt;%
  filter(department == "Sales") %&gt;%
  select(name, age, score) %&gt;%
  arrange(desc(score))

# 原生管道 |&gt; （R 4.1+）
df |&gt;
  filter(department == "Sales") |&gt;
  select(name, age, score) |&gt;
  arrange(desc(score))
```

.tip-box[
`Ctrl+Shift+M` 快速插入管道符  

【POSITRON】打开Settings搜索pipe，选择对应符号类型

【Rstudio】修改程序中pipe符号类型：Tools → Global Options → Code → Editing → 勾选/取消勾选 **Use native pipe operator |&gt;**
]

&lt;img src="image-2.png" width="60%" style="display: block; margin: auto;" /&gt;
]

.pull-right[
### 管道核心思想

- **管道左边是数据，右边是动词**
- `%&gt;%`（magrittr）与 `|&gt;`（R 4.1+）二选一
- 团队统一写法即可

### 调试技巧

在管道中间插入 `glimpse()` 观察中间结果：


``` r
df %&gt;%
  filter(department == "Sales") %&gt;%
  glimpse() %&gt;%      # ← 调试：查看这一步结果
  select(name, score) %&gt;%
  arrange(desc(score))
```

.note-box[
调试完成后记得删除中间的 `glimpse()`！
]
]

# 1.3 tibble vs data.frame

.pull-left[
### 关键区别

| 维度 | data.frame | tibble |
|---|---|---|
| 打印 | 可能显示很多行列 | 默认显示部分行，带类型 |
| 子集 `[, 1]` | 常退化为向量 | 行为更稳定 |
| 生态兼容 | base 友好 | dplyr/tidyr 默认输出 |


``` r
class(df)
```

```
[1] "tbl_df"     "tbl"        "data.frame"
```

.tip-box[
表示对象是 tibble，同时兼容 data.frame。但不是纯dataframe，使用基于dataframe格式的函数时会需要用as.data.frame()转换。
]
]

.pull-right[
### 案例

``` r
test &lt;- as.tibble(x = 1:3)

class(test)
```

```
[1] "tbl_df"     "tbl"        "data.frame"
```

``` r
is.data.frame(test)
```

```
[1] TRUE
```

``` r
is_tibble(test)
```

```
[1] TRUE
```

``` r
test_df &lt;- as.data.frame(test)
class(test_df)
```

```
[1] "data.frame"
```

``` r
is_tibble(test_df)
```

```
[1] FALSE
```

]

# dplyr 动词体系

.pull-left[
## 单表操作——按对象分三类

### 行（Rows）
- `filter()` — 按条件保留行
- `slice()` 系列 — 按位置选行
- `arrange()` — 排序

### 列（Columns）
- `select()` — 选列/丢列
- `rename()` — 改列名
- `mutate()` — 新增/改造列
- `relocate()` — 调整列顺序

### 分组（Groups of rows）
- `group_by()` — 设置分组
- `summarize()` — 聚合压缩
- `across()` — 批量跨列操作
- `count()` — 快速频数统计
]

.pull-right[
## 核心管道顺序

```
数据
  ↓  filter()     ← 缩小行
  ↓  mutate()     ← 造变量
  ↓  select()     ← 投影列
  ↓  arrange()    ← 排序
  ↓  group_by()   ← 分组
  ↓  summarize()  ← 聚合
结果表
```

.green-box[
真实项目里顺序未必唯一，但**先缩行 → 改列 → 投影 → 排序 → 聚合**是最常见的套路。
]
]

# 2.1.0 行操作：逻辑向量基础

在正式讲 `filter()` 之前，先掌握**逻辑向量**的写法：

.pull-left[

``` r
# 比较运算 → 逻辑向量
df$age &gt; 30
```

```
 [1] FALSE FALSE  TRUE FALSE  TRUE  TRUE  TRUE    NA FALSE  TRUE
```
]
.pull-right[

``` r
# 缺失值检测
is.na(df$score)
```

```
 [1] FALSE FALSE FALSE  TRUE FALSE FALSE FALSE FALSE FALSE FALSE
```
]


``` r
df$gender == "F"                        # 等值比较
df$department %in% c("Sales", "IT")     # 集合成员
df$age &gt; 30 &amp; !is.na(df$score)         # 且（&amp;）
df$age &lt; 25 | df$score &gt; 90            # 或（|）
```

.warn-box[
**⚠️ 三个易错点**
1. `x == NA` **不对**！缺失值判断必须用 `is.na(x)`
2. 多条件逐元素比较用 `&amp;` / `|`；`&amp;&amp;` / `||` 只对长度为 1 的逻辑值
3. `filter()` 会**自动丢弃** NA 行（NA 不等于 TRUE）
]

# 2.1.2 按位置选行：`slice()` 家族

### 核心区别：slice vs head

| 函数 | 选行依据 | 支持分组 |
|---|---|---|
| `head(df, n)` | 前 n 行位置 | 否 |
| `slice_head(n=5)` | 前 n 行位置 | ✅ 每组取 n 行 |
| `slice_tail(n=5)` | 后 n 行位置 | ✅ |
| `slice_min(order_by=x)` | 最小值行 | ✅ |
| `slice_max(order_by=x)` | 最大值行 | ✅ |
| `slice_sample(n=3)` | 随机抽行 | ✅ |

.note-box[

.panel[.panel-name[`sort()` vs `order()` vs `arrange()`对比]

| 函数 | 适用对象 | 返回什么 |
|---|---|---|
| `sort(x)` | **向量** | 排好序的向量值 |
| `order(x)` | **向量** | 排序后的**行号索引** |
| `arrange(df)` | **数据框** | 排好序的完整数据框 |


``` r
# sort()：只能排向量，不能排数据框
sort(df$score, na.last = TRUE)        # ✅ 向量排序

# order()：返回索引，再用 [] 取行
df[order(df$score), ]                 # 升序
df[order(-df$score), ]                # 降序（数值列加负号）
df[order(df$department, -df$score), ]                # 多列排序

# arrange()：直接排数据框，最清晰
df %&gt;% arrange(score)                    # 升序
df %&gt;% arrange(desc(score))              # 降序（任意类型通用）
df %&gt;% arrange(department, desc(score))  # 多列
```

]
]

# 2.3.1 分组：`group_by()`

.pull-left[
### 函数Usage


``` r
group_by(.data, ...,
         .add = FALSE,
         .drop = TRUE)
```
| 参数 | 含义 |
|---|---|
| `...` | 分组变量，支持多个 |
| `.add` | 是否在现有分组基础上追加（默认替换） |
| `.drop` | 是否自动丢弃没有观测的因子水平 |

.tip-box[
`group_by()` 是分组的意思，后续可以接分组的生成（`mutate()`）或汇总计算（`summarize()`）。使用结束后一定记得 `ungroup()` 或写 `.groups = "drop"`表示取消分组，避免影响后续计算操作。

  group_by(department) %&gt;%
  mutate(rank_in_dept = min_rank(desc(score))) %&gt;%
  ungroup() %&gt;%
  select(name, department, score, rank_in_dept) %&gt;%
  arrange(department, rank_in_dept)
```

### `.groups` 选项

### 常用聚合函数

df %&gt;%
  group_by(department) %&gt;%
  summarize(

    min_score  = min(score, na.rm = TRUE),   # 最小值

    sd_score   = sd(score, na.rm = TRUE),    # 标准差
    n_pass     = sum(score &gt;= 60,
                     na.rm = TRUE)          # 条件计数
  ) %&gt;%

# 2.3.2 多列批量汇总：`across()`

.pull-left[
### 函数Usage


``` r
across(.cols, .fns,
       .names = NULL,
       .unpack = FALSE)
```

| 参数 | 含义 |
|---|---|
| `.cols` | 要处理的列，使用 tidy-select 语法（`where()`、`starts_with()` 等） |
| `.fns` | 应用的函数或函数列表（见下方写法） |
| `.names` | 输出列名模板，`{.col}` 代表原列名，`{.fn}` 代表函数名 |
| `.unpack` | 函数返回 data.frame 时是否自动展开列（一般不用） |

### `.fns` 常见写法

| 写法 | 示例 | 适合场景 |
|---|---|---|
| 单个函数名 | `mean` | 一个函数，无额外参数 |
| purrr lambda | `~ mean(.x, na.rm = TRUE)` | 需要传参数 |
| 命名列表 | `list(avg = ~ mean(.x, na.rm = TRUE), n_na = ~ sum(is.na(.x)))` | 同时应用多个函数 |

.warn-box[
旧写法 `summarise_at()` / `summarise_if()` 已被 `across()` 取代，优先使用 `across()`!
]
]

.pull-right[
### 代码示例


``` r
# .cols 用 where() 选数值列，.fns 用 lambda 传 na.rm
df %&gt;%
  group_by(department) %&gt;%
  summarize(
    across(where(is.numeric),
           ~ mean(.x, na.rm = TRUE))
  ) %&gt;% 
  ungroup()
```

```
# A tibble: 3 × 4
  department    id   age score
  &lt;chr&gt;      &lt;dbl&gt; &lt;dbl&gt; &lt;dbl&gt;
1 HR           5.5  38.5  82  
2 IT           6    29.7  88.3
3 Sales        5    34.8  86.8
```


``` r
# .names 控制输出列名
df %&gt;%
  group_by(department) %&gt;%
  summarize(
    across(c(score, age),
           list(avg = ~ mean(.x, na.rm = TRUE),
                sd  = ~ sd(.x, na.rm = TRUE)),
           .names = "{.col}_{.fn}")  # 生成 score_avg, score_sd, age_avg, age_sd
  ) %&gt;% 
  ungroup()
```

```
# A tibble: 3 × 5
  department score_avg score_sd age_avg age_sd
  &lt;chr&gt;          &lt;dbl&gt;    &lt;dbl&gt;   &lt;dbl&gt;  &lt;dbl&gt;
1 HR              82       8.49    38.5   9.19
2 IT              88.3     5.51    29.7   1.53
3 Sales           86.8     7.14    34.8  11.0 
```

# 2.4 完整管道案例（dplyr 主干函数）


``` r
report &lt;- df %&gt;%
* filter(!is.na(score),
         department %in% c("Sales","IT","HR")) %&gt;%
* mutate(
    pass  = if_else(score &gt;= 60, TRUE, FALSE, missing = FALSE),  
    grade = case_when(
      score &gt;= 90 ~ "A", score &gt;= 80 ~ "B",
      score &gt;= 70 ~ "C", TRUE ~ "D")
  ) %&gt;%
  select(id, name, department, age, score, pass, grade) %&gt;%
  rename(department_label = department) %&gt;%                      
* distinct(id, .keep_all = TRUE) %&gt;%
  arrange(department_label, desc(score)) %&gt;%
  group_by(department_label) %&gt;%                                
* summarize(
    n = n(), avg_score = mean(score, na.rm = TRUE),
    max_score = max(score, na.rm = TRUE),
    n_pass = sum(pass, na.rm = TRUE),
    n_A = sum(grade == "A", na.rm = TRUE)
  ) %&gt;%
  ungroup() %&gt;% 
  arrange(desc(avg_score))

report
```

1 IT                   3      88.3        92      3     2
2 Sales                4      86.8        95      4     1

# 2.4 管道步骤解读

| 步骤 | 函数 | 作用 |
|---|---|---|
| 1 | `filter(!is.na(score), ...)` | 去掉 score 为 NA 的行；限定 department 范围 |
| 2 | `mutate(...)` | 新增 `pass`（if_else 二分）和 `grade`（case_when 多档） |
| 3 | `select(...)` | 只保留分析所需列 |
| 4 | `rename(department_label = department)` | 改名（新名 = 旧名） |
| 5 | `distinct(id, .keep_all = TRUE)` | 按 id 去重保留其余列 |
| 6 | `arrange(department_label, desc(score))` | 先部门升序，部门内分数降序 |
| 7 | `group_by(department_label)` | 按部门分组 |
| 8 | `summarize(..., .groups = "drop")` | 每组一行：人数、均分、最高分、通过数、A 级数 |
| 9 | `arrange(desc(avg_score))` | 对汇总表按均分排序 |

.tip-box[
可在管道任意两行之间插入 `glimpse()` 或 `count(department_label)` 观察中间结果——调试利器！
]

# 3.1 四种多表连接：`left_join` / `right_join` / `inner_join` / `full_join`

.pull-left[
### 连接类型

| 函数 | 保留哪侧的键 |
|---|---|
| `left_join(x, y)` | 保留 **x** 的所有键；y 无匹配补 NA |
| `right_join(x, y)` | 保留 **y** 的所有键 |
| `inner_join(x, y)` | 只保留**两边都匹配**的键 |
| `full_join(x, y)` | 保留键的**并集**，缺侧补 NA |

### 函数共性Usage


``` r
left_join(x, y, by = NULL,
          copy = FALSE, suffix = c(".x", ".y"),
          keep = NULL, na_matches = "na",
          relationship = NULL, unmatched = "drop")
```

| 参数 | 含义 |
|---|---|
| `x`, `y` | 左表与右表 |
| `by` | 连接键（建议**始终显式写出**） |
| `suffix` | 同名非键列的后缀（默认 `.x` / `.y`） |
| `keep` | 是否同时保留两侧键列（`TRUE` 便于核对） |
| `na_matches` | NA 是否匹配 NA（默认`"na"`为匹配，`"never"` 不匹配） |
| `relationship` | 声明键关系（`"one-to-one"` / `"many-to-one"` 等） |
| `unmatched` | 发现不匹配时是否报错（`"error"` 可作保底检查） |

]

.pull-right[
### 构造示例数据


``` r
employees &lt;- tibble(
  id   = c(1:3, NA),
  name = c("Alice","Bob","Charlie", "XXX")
)
sales &lt;- tibble(
  id    = c(2, 3, 4, NA),
  sales = c(1000, 500, 750, 200)
)

employees %&gt;% 
  left_join(sales, by = "id")
```

```
# A tibble: 4 × 3
     id name    sales
  &lt;dbl&gt; &lt;chr&gt;   &lt;dbl&gt;
1     1 Alice      NA
2     2 Bob      1000
3     3 Charlie   500
4    NA XXX       200
```


``` r
## 当不提供by时，会默认识别所有名字一致的作为by变量并输出message提示
employees %&gt;% 
  left_join(sales)
```

```
Joining with `by = join_by(id)`
```

```

# 3.1 Join 参数详解

.panelset[
.panel[.panel-name[by / join_by()]
.pull-left[
### `by` — 连接键

| 写法 | 说明 |
|---|---|
| `by = "id"` | 同名单键 |
| `by = c("id", "visit")` | 同名多键 |
| `by = c("subjid" = "id")` | 不同名键（旧写法） |
| `by = join_by(subjid == id)` | 不同名键（**推荐新写法**） |

.warn-box[
`by = NULL` 会 natural join（用所有同名列），项目中建议**始终显式写出 `by`**！
]
]
.pull-right[

``` r
# 同名键
left_join(x, y, by = "id")
left_join(x, y, by = c("id", "visit"))

# 不同名键（旧写法）
left_join(x, y, by = c("subjid" = "id"))

# join_by() 推荐新写法
left_join(x, y, by = join_by(subjid == id))
left_join(x, y, by = join_by(id, visit))
```
]
]
.panel[.panel-name[keep]
.pull-left[
### `keep` — 是否保留两侧键列

| 值 | 说明 |
|---|---|
| `NULL`（默认） | 合并后只保留左表键列 |
| `TRUE` | 保留两侧键列，方便核对映射关系 |
| `FALSE` | 只保留左表键列 |

.tip-box[
调试连接结果时用 `keep = TRUE` 可以直接看到两侧键的对应关系，确认 join 正确后再去掉。
]
]
.pull-right[

``` r
employees2 &lt;- rename(employees, subjid = id)

# keep = TRUE：保留两边键列，方便核对映射
employees2 %&gt;% 
  left_join(sales, by = join_by(subjid == id), keep = TRUE)
```

```
# A tibble: 4 × 4
  subjid name       id sales
   &lt;int&gt; &lt;chr&gt;   &lt;dbl&gt; &lt;dbl&gt;
1      1 Alice      NA    NA
2      2 Bob         2  1000
3      3 Charlie     3   500
4     NA XXX        NA   200
```
]
]
.panel[.panel-name[na_matches]
.pull-left[
### `na_matches` — NA 是否参与匹配

| 值 | 说明 |
|---|---|
| `"na"`（默认） | NA 匹配 NA（R 行为） |
| `"never"` | NA 不匹配 NA（接近 SQL 行为） |

.warn-box[
项目中若键列可能含 NA，务必明确选择：默认 `"na"` 会把所有 NA 行互相匹配，可能产生意外笛卡尔积！
]
]
.pull-right[

``` r

  left_join(sales, by = "id")

# na_matches = "never"：NA 不参与匹配 → id=NA 的行补 NA

### `relationship` — 键关系声明

| 值 | 说明 |
|---|---|
| `"one-to-one"` | 两侧键均唯一 |
| `"one-to-many"` | 左表键唯一，右表可重复 |

# 3.3 整洁数据与重塑：`pivot_longer()` / `pivot_wider()`

.panelset[
.panel[.panel-name[概念 &amp; 示例]
.pull-left[
### 宽表 vs 长表

| 函数 | 方向 | 行列变化 | 最核心问题 |
|---|---|---|---|
| `pivot_longer()` | 宽 → 长 | 行↑ 列↓ | 哪些列要堆叠成行？ |
| `pivot_wider()` | 长 → 宽 | 列↑ 行↓ | 哪列提供新列名？哪列提供值？ |

### 演示数据


``` r
df_wide &lt;- tibble(
  id      = 1:3,
  math    = c(85, 92, 78),
  english = c(90, 88, 95)
)
df_wide
```

```
# A tibble: 3 × 3
     id  math english
  &lt;int&gt; &lt;dbl&gt;   &lt;dbl&gt;
1     1    85      90
2     2    92      88
3     3    78      95
```
]
.pull-right[
### 宽 → 长


``` r
#math/english这两列进入了subject列；原来的单元格值进入了score列。
df_long &lt;- df_wide %&gt;%
  pivot_longer(
*   cols     = c(math, english),
    names_to = "subject",
    values_to = "score"
  )
df_long
```

```
# A tibble: 6 × 3
     id subject score
  &lt;int&gt; &lt;chr&gt;   &lt;dbl&gt;
1     1 math       85
2     1 english    90
3     2 math       92
4     2 english    88
5     3 math       78
# ℹ 1 more row
```

### 长 → 宽（还原）


``` r
df_long %&gt;%
  pivot_wider(names_from = subject, values_from = score)
```

```
# A tibble: 3 × 3
     id  math english
  &lt;int&gt; &lt;dbl&gt;   &lt;dbl&gt;
1     1    85      90
2     2    92      88

```

]

  names_to      = "name",

  names_sep     = NULL,
  names_pattern = NULL,
  values_to     = "value",
  values_drop_na = FALSE,
  names_transform  = NULL,
  values_transform = NULL
)
```

# 4.1 缺失值处理

.panelset[
.panel[.panel-name[删除：drop_na()]
.pull-left[
### 函数Usage


``` r
drop_na(data, ...)
```

| 参数 | 含义 |
|---|---|
| `data` | 数据框（管道传入） |
| `...` | 要检查的列；不填则检查**所有列** |

- 指定列时：该列含 NA → 删行
- 不指定时：**任意一列**含 NA → 删行（更严格）

.warn-box[
`drop_na()` 不加列名，可能意外删除含任意缺失的记录！
]
]
.pull-right[

``` r
messy &lt;- tibble(
  id    = c(1, 1, 2, 2),
  day   = c(1, 2, NA, 2),
  value = c(10, NA, 30, NA)
)

# 只删 value 列为 NA 的行
messy %&gt;% drop_na(value)
```

```
# A tibble: 2 × 3
     id   day value
  &lt;dbl&gt; &lt;dbl&gt; &lt;dbl&gt;
1     1     1    10
2     2    NA    30
```


``` r
# 不指定列：任意列有 NA 就删（此处等价）
messy %&gt;% drop_na()
```

```
# A tibble: 1 × 3
     id   day value
  &lt;dbl&gt; &lt;dbl&gt; &lt;dbl&gt;
1     1     1    10
```
]
]
.panel[.panel-name[填补：fill()]
.pull-left[
### 函数Usage


``` r
fill(data, ...,
     .direction = c("down", "up", "downup", "updown"))
```

| 参数 | 含义 |
|---|---|
| `data` | 数据框（管道传入） |
| `...` | 要填充的列 |
| `.direction` | 填充方向：`"down"` 向下（**默认**）；`"up"` 向上；`"downup"` 先下后上；`"updown"` 先上后下 |

.tip-box[
`fill()` 用**上一个（或下一个）非 NA 值**填充当前 NA，常用于纵向重复的分组标签或 LOCF（末次观测值结转）场景。
]

.warn-box[
务必配合 `group_by()` 使用，否则会跨组填充——把上一个受试者的值填到下一个受试者里！
]
]
.pull-right[

``` r
# 向下填充（LOCF）
messy %&gt;%
* group_by(id) %&gt;%
  fill(value, .direction = "down") %&gt;%
  ungroup()
```

```
# A tibble: 4 × 3
     id   day value
  &lt;dbl&gt; &lt;dbl&gt; &lt;dbl&gt;
1     1     1    10
2     1     2    10
3     2    NA    30
4     2     2    30
```


``` r

# 4.2 字符串处理：`stringr`

.panelset[
.panel[.panel-name[核心函数概览]
.pull-left[
### 函数一览

| 函数 | 类型 | 常见用途 |
|---|---|---|
| `str_detect()` | 检测 | 判断是否匹配，放 `filter()` 里筛行 |
| `str_count()` | 检测 | 统计匹配出现次数 |
| `str_extract()` | 提取 | 提取**首个**匹配文本 |
| `str_extract_all()` | 提取 | 提取**所有**匹配文本 |
| `str_replace()` | 替换 | 替换**首次**匹配 |
| `str_replace_all()` | 替换 | 替换**全部**匹配 |
| `str_trim()` | 清洗 | 去首尾空格 |
| `str_squish()` | 清洗 | 去首尾 + 压缩中间多余空格 |
| `str_to_lower()` / `str_to_upper()` | 格式化 | 大小写转换 |
| `str_sub()` | 截取 | 按位置截取子串 |
| `str_split()` | 拆分 | 按分隔符拆成列表 |

.note-box[
`pattern` 默认是**正则表达式**；只想匹配字面量时用 `fixed(".")`。  
数字要写 `"\\d"` 不是 `"\d"`！
]
]
.pull-right[
### 选函数的思路

```
我想...
  ├─ 判断某列是否含某模式   → str_detect()
  ├─ 统计匹配出现几次       → str_count()
  ├─ 把匹配内容提取出来     → str_extract()
  ├─ 把某个模式替换掉       → str_replace_all()
  ├─ 去掉首尾空格           → str_trim() / str_squish()
  ├─ 统一大小写             → str_to_lower() / str_to_upper()
  └─ 按位置截取             → str_sub()
```

### 正则常用速查

| 符号 | 含义 |
|---|---|
| `\\d` | 数字 0-9 |
| `\\w` | 字母/数字/下划线 |
| `\\s` | 空白字符 |
| `.` | 任意单字符 |
| `+` | 一个或多个 |
| `*` | 零个或多个 |
| `^` / `$` | 行首 / 行尾 |
]
]

| `pattern` | 正则表达式（默认）或 `fixed("字面量")` |
| `negate` | `TRUE` 时取反（不匹配返回 TRUE） |

    upper = str_to_upper(squished),
    title = str_to_title(squished)
  )

# 4.5 purrr 介绍

.panelset[
.panel[.panel-name[核心概念]
.pull-left[
### 核心价值

`purrr` 解决的是：**对很多对象做同一件事**（函数式编程工具箱）

- 对列表/向量中每个元素应用同一函数
- 读入多个文件后对每个文件做同样清洗
- 按组拆分数据，对每组重复建模/汇总
- 从复杂列表中批量提取某个字段

### map() 家族一览

| 函数 | 返回类型 | 对应 `apply` |
|---|---|---|
| `map(.x, .f)` | list | `lapply()` |
| `map_lgl()` | 逻辑向量 | — |
| `map_int()` | 整数向量 | — |
| `map_dbl()` | 数值向量 | `sapply(..., simplify=TRUE)` |
| `map_chr()` | 字符向量 | — |
| `map2(.x,.y,.f)` | list | `mapply()` |
| `pmap(.l, .f)` | list | `mapply()` |
| `walk(.x, .f)` | 原对象（副作用） | — |
| `imap(.x, .f)` | list（带索引） | — |
]
.pull-right[
### Lambda 函数写法

purrr 支持两种 lambda 写法：


``` r
# 写法1：purrr 风格（~ .x，传统）
map_dbl(x, ~ mean(.x, na.rm = TRUE))

# 写法2：R 4.1+ 原生 lambda（\(x)，更通用）
map_dbl(x, \(x) mean(x, na.rm = TRUE))
```

### across() vs map()

| 场景 | 工具 |
|---|---|
| 对数据框**多列**做变换/汇总 | `across()` |
| 对**列表中每个元素**迭代处理 | `map()` |
| 对**多个文件/模型**重复处理 | `map()` |

.warn-box[
想得到数值向量却用了 `map()` → 结果是 list！  
明确返回类型，用对应的 `map_dbl()` / `map_chr()` 等。
]
]
]
.panel[.panel-name[map()：单输入迭代]
.pull-left[
### 函数Usage


``` r
map(.x, .f, ...)
map_lgl(.x, .f, ...)
map_int(.x, .f, ...)
map_dbl(.x, .f, ...)
map_chr(.x, .f, ...)
```

| 参数 | 含义 |
|---|---|
| `.x` | 向量或列表，每次取出一个元素 |
| `.f` | 应用的函数，可以是函数名、lambda `~`、`\(x)` |
| `...` | 传给 `.f` 的额外参数 |

### 三种传函数的方式


``` r
# 方式1：函数名（无额外参数时）
map_dbl(x, mean)

# 方式2：purrr lambda（需传额外参数）
map_dbl(x, ~ mean(.x, na.rm = TRUE))

# 方式3：R 原生 lambda（R 4.1+）
map_dbl(x, \(x) mean(x, na.rm = TRUE))
```

.tip-box[
`.f` 也可以是**字符串**或**整数**——用于从列表中按名/按位置提取元素。
]
]

*map_chr(people, "name")
```

```

```
[1] 1 4
```
]
]
]
.panel[.panel-name[map2() &amp; pmap()：多输入迭代]
.pull-left[
### 函数Usage


``` r
# 两个输入同步迭代
map2(.x, .y, .f, ...)
map2_dbl(.x, .y, .f, ...)   # 及其他类型变体

# 多个输入（从 list 取列）

```

| 函数 | 说明 |
|---|---|
| `map2(.x, .y, .f)` | 每次把 `.x[[i]]` 和 `.y[[i]]` 同时传给 `.f` |
| `pmap(.l, .f)` | `.l` 是列表，每次把 `.l[[1]][[i]]`, `.l[[2]][[i]]`... 传给 `.f` |

]
.pull-right[

```

.pull-left[
### map()：按列迭代

data frame 本质是列的列表，`map()` 默认**按列**迭代，每次取出一列：


``` r

### map2()：两个 df 对应列配对

`map2(df1, df2, .f)` 把两表**对应列**（第 i 列 vs 第 i 列）同时传给函数：


``` r
map2(df1, df2, ~ .x + .y)   # 对应列逐元素相加
map2(df1, df2, cor)          # 对应列分别做相关
```

### pmap()：按行迭代

`pmap()` 把 data frame **每一行**各列值作为具名参数传给函数（列名 = 参数名）：


``` r
pmap(df, \(col1, col2, ...) ...)
```

# 5.1 单表操作对照总表

| 操作 | tidyverse（dplyr / tidyr） | SAS / SQL 概念 |
|---|---|---|
| 新建/变换列 | `mutate(x = expr, y = ifelse(...), z = case_when(...))` | Data Step 赋值；`IF-THEN-ELSE` / `IFC` |
| 按条件保留行 | `filter(var1 &gt; 100, var2 == "A")` | Data Step `IF ... THEN OUTPUT`；SQL `WHERE` |
| 选列 / 丢列 | `select(a, b)` / `select(-c)` | `KEEP` / `DROP`；SQL `SELECT` |
| 排序 | `arrange(desc(var1), var2)` | `PROC SORT; BY DESCENDING var1 var2;` |
| 去重行 | `distinct()` / `distinct(id, .keep_all = TRUE)` | `PROC SORT NODUPKEY` / `NODUPRECS` |
| 分组汇总 | `group_by + summarize + ungroup()` | `PROC MEANS` / `PROC SQL GROUP BY` |
| 快速频数 | `count(x)` / `add_count(x)` | `PROC FREQ`；SQL `GROUP BY + COUNT(*)` |
| 纵向合并 | `bind_rows(df1, df2, df3)` | 多数据集 `SET`（栈叠） |
| 横向按键合并 | `inner/left/full_join` | `PROC SQL JOIN` / `MERGE BY` |
| 宽长变换 | `pivot_longer` / `pivot_wider` | `PROC TRANSPOSE` |
| 缺失值处理 | `drop_na()` / `fill()` / `replace_na()` | `IF MISSING THEN DELETE` / `RETAIN` / `COALESCE` |
| 键质检 | `anti_join` / `semi_join` | 查孤儿键 / 检查匹配是否存在 |

# 5.2 Data Step vs dplyr 管道

.pull-left[
### SAS Data Step 典型顺序

```sas
DATA output;
  SET input;                   /* 读入 */
  IF score &gt;= 60 THEN pass = 1;/* 条件变量 */
  ELSE                  pass = 0;
  IF department IN ("Sales","IT");  /* 筛行 */
  KEEP id name department score pass;
RUN;

PROC SORT DATA = output;
  BY department DESCENDING score;
RUN;

PROC MEANS DATA = output;
  BY department;
  VAR score;
RUN;
```
]

.pull-right[
### R dplyr 管道等价写法


``` r
output &lt;- input %&gt;%
  mutate(                          # 条件变量
    pass = if_else(score &gt;= 60,
                   TRUE, FALSE,
                   missing = FALSE)
  ) %&gt;%
  filter(department %in%           # 筛行
           c("Sales","IT")) %&gt;%
  select(id, name,                 # 投影列
         department, score, pass) %&gt;%
  arrange(department,              # 排序
          desc(score)) %&gt;%
  group_by(department) %&gt;%         # 分组
  summarize(                       # 汇总
    avg_score = mean(score,
                     na.rm = TRUE),
    .groups = "drop"
  )
```
]

|---|---|---|
| 字符串清洗 | `str_detect()`, `str_replace_all()`, `str_extract()` | `INDEX/FIND/SCAN/COMPRESS/TRANWRD`；SQL `LIKE/SUBSTR/CASE WHEN` |
| 日期解析与拆分 | `ymd()`, `month()`, `wday()`, `floor_date()` | `input(..., yymmdd10.)`, `year()`, `month()`, `weekday()`, `intnx()` |
| 因子顺序与合并 | `fct_relevel()`, `fct_infreq()`, `fct_lump_n()` | SAS 无直接等价；靠格式映射和报表/作图时控制显示顺序 |
| 列级批量处理 | `across(where(is.numeric), mean)` | SAS array、宏变量循环；`PROC` 一次指定多个分析变量 |
| 列表/多对象迭代 | `map()`, `map_dbl()`, `split() %&gt;% map()` | 宏循环；对多个数据集重复运行 DATA step / PROC |
