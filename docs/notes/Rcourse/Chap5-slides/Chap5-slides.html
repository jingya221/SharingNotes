# 0.1 这张表到底在表达什么

.pull-left[
### 典型 Demographics Table Shell

```
Table 14.1.2.1.1 Demographics (FAS)

                    Treatment A    Treatment B
                     (N=xx)         (N=xx)

Age (year)
  n                    xx             xx
  Mean                 xx.x           xx.x
  S.D.                 xx.xx          xx.xx
  Median               xx.x           xx.x
  Q1, Q3               xx.x, xx.x     xx.x, xx.x
  Min, Max             xx, xx         xx, xx

Age group (year), n (%)
  &lt;= 65                xx (xx.x)      xx (xx.x)
  &gt; 65                 xx (xx.x)      xx (xx.x)

Sex, n (%)
  Male                 xx (xx.x)      xx (xx.x)
  Female               xx (xx.x)      xx (xx.x)
```
]

.pull-right[
### 两大变量类型

.green-box[
**① 连续变量**  
`AGE`、`WEIGHT`、`BMI`  
→ n · Mean · SD · Median · Q1/Q3 · Min/Max
]

.tip-box[
**② 分类变量**  
`AGEGR1`、`SEX`、`RACE`、`ETHNIC`  
→ n (%) 按 level 展开
]

.note-box[
核心不是"画表"，而是：**按列分组，对变量做规则化汇总**
]
]

# 统计量基础 &amp; 分母约定

.section-num[1]

.footnote[[↑ 返回目录](#toc)]

class: animated, fadeIn

# 1.1 常见统计量与 R 函数对照

| 行标签 | 含义 | 常见 R 函数 |
|---|---|---|
| `n` | 非缺失样本数 | `sum(!is.na(x))` |
| `Mean` | 均值 | `mean(x, na.rm = TRUE)` |
| `S.D.` | 标准差 | `sd(x, na.rm = TRUE)` |
| `Median` | 中位数 | `median(x, na.rm = TRUE)` |
| `Q1, Q3` | 25% / 75% 分位数 | `quantile(x, probs = c(0.25, 0.75), na.rm = TRUE)` |
| `Min, Max` | 最小值与最大值 | `range(x, na.rm = TRUE)` |
| `n (%)` | 频数和百分比 | `table()` + `prop.table()` |

.warn-box[
**`sd()` 边界情况**：某组只有 1 个非缺失值时，`sd()` 返回 `NA`，这是统计上的正常行为，不是 bug。

**`quantile()` 算法**：默认 `type = 7`，如果 SAP 有固定口径（如 SAS 的 `PCTLDEF=5`），必须显式指定 `type`。
]

---
class: animated, fadeIn

# 1.2 两个分母问题——临床表最易出错的地方

.pull-left[
### 连续变量的分母

- `n` = 当前组该变量的**非缺失人数**
- 其他统计量也在非缺失值上计算

```r
x &lt;- c(61, 67, NA, 72, 64)
sum(!is.na(x))   # n = 4，不是 5
mean(x, na.rm = TRUE)
```
]

.pull-right[
### 分类变量的分母

- `n` = 该 level 的人数
- `%` 的分母 = **当前 treatment group 的列总人数 N**

```r
# 百分比用列分母 N，不是 level 总和
count / N_col * 100
```

.warn-box[
SAP 另有规定时以 SAP 为准。最常见的 Demographics 表使用**列分母 `N_col`**，不是变量非缺失人数。
]
]

# 1.3 课堂演示数据集


``` r
library(dplyr)

adsl &lt;- tibble::tibble(
  USUBJID = sprintf("SUBJ%03d", 1:16),
  ARM     = rep(c("Treatment A", "Treatment B"), each = 8),
  AGE     = c(61, 67, 59, 72, 64, 55, 69, 63,
              58, 62, 70, 66, 54, 73, 68, 60),
  SEX     = c("Male","Female","Male","Male","Female","Female","Male","Female",
              "Female","Male","Male","Female","Female","Male","Female","Male"),
  RACE    = c("Asian","Asian","White","Asian","White","Asian","Other","White",
              "Asian","White","White","Asian","Asian","Other","White","Asian"),
  AVAL    = c(14.2,10.8,16.4,8.1,12.5,18.0,7.4,13.1,
              15.0,11.2,9.5,12.0,17.2,6.8,10.4,14.8),
  CNSR    = c(0,1,0,1,0,0,1,0,1,0,0,1,0,1,0,0)
) %&gt;%
  mutate(
*   AGEGR1   = if_else(AGE &lt;= 65, "&lt;=65", "&gt;65"),
*   is_event = CNSR == 0
  )
```

.pull-left[
.note-box[`ARM`：列分组变量 | `AGE`：连续变量 | `AGEGR1/SEX/RACE/ETHNIC`：分类变量]
]
.pull-right[
.tip-box[`AVAL` + `is_event`：用于后面 survival analysis 入口示例]

# 2.1 base R 的三件事

.pull-left[
### 核心目标

base R 的重点不是"写得最短"，而是理解：

1. **如何拆组**
2. **如何对每组做统计**
3. **如何把多个统计结果拼成一张表**

### 常用函数速查

| 函数 | 用途 |
|---|---|
| `split()` | 按分组拆数据为列表 |
| `lapply()` | 对每组重复计算 |
| `tapply()` | 单统计量分组汇总 |
| `table()` | 频数统计 |
| `prop.table()` | 比例统计 |
| `quantile()` | 计算分位数 |
]

.pull-right[
### 与 tidyverse 的关系

| 维度 | base R | tidyverse |
|---|---|---|
| 学习价值 | 理解底层算法 | 工程效率更高 |
| 透明度 | 高 | 中 |
| 临床表复用 | 一般 | 配合 rtables 更强 |

.green-box[
**教学顺序：先 base R → 再 rtables/tern**  
先知道每一行怎么算，才不会变成"只会抄模板"
]
]

---
class: animated, fadeIn

# 2.2 连续变量汇总函数

.pull-left[
### 定义通用统计函数


``` r
cont_stats &lt;- function(x) {
  q &lt;- quantile(x, probs = c(0.25, 0.75),
                na.rm = TRUE, names = FALSE)
  r &lt;- range(x, na.rm = TRUE)

  list(
    n      = sum(!is.na(x)),
    mean   = mean(x, na.rm = TRUE),
    sd     = sd(x, na.rm = TRUE),
    median = median(x, na.rm = TRUE),
    q1     = q[1],
    q3     = q[2],
    min    = r[1],
    max    = r[2]
  )
}

cont_stats(adsl$AGE)
```

```
$n
[1] 16

$mean
[1] 63.8125

$sd
[1] 5.810551

$median
[1] 63.5

$q1
[1] 59.75

$q3
[1] 68.25

$min
[1] 54

$max
[1] 73
```
]

.pull-right[
### 两个高频易错点


``` r
# 只有 1 个值时，sd() 返回 NA（正常）
sd(c(5))
```

```
[1] NA
```


``` r
# 默认 type=7，如需 SAS 口径可指定
quantile(adsl$AGE,
         probs = c(0.25, 0.75),
         type  = 7)
```

```
  25%   75% 
59.75 68.25 
```

.warn-box[
如果 SAP 指定分位数算法（如 SAS PCTLDEF=5），  
必须在 `quantile()` 里显式写 `type = 2`
]
]

.panelset[
.panel[.panel-name[split + lapply]

age_by_arm &lt;- split(adsl$AGE, adsl$ARM)

# lapply：对每组重复调用 cont_stats

.panel[.panel-name[格式化为表格文本]

``` r
fmt_num  &lt;- function(x, d=1) ifelse(is.na(x), "NA",
              formatC(x, format="f", digits=d))
fmt_pair &lt;- function(x, y, d=1, sep=", ")
              paste0(fmt_num(x,d), sep, fmt_num(y,d))

cont_stats_to_rows &lt;- function(x) {
  s &lt;- cont_stats(x)
  c("n"        = as.character(s$n),
    "Mean"     = fmt_num(s$mean, 1),
    "S.D."     = fmt_num(s$sd,   2),
    "Median"   = fmt_num(s$median, 1),
    "Q1, Q3"   = fmt_pair(s$q1, s$q3, 1),
    "Min, Max" = fmt_pair(s$min, s$max, 0))
}

lapply(age_by_arm, cont_stats_to_rows)
```

```

# 2.4 分类变量：`table()` &amp; `prop.table()`

.panelset[
.panel[.panel-name[频数表]

``` r
# 单变量频数
table(adsl$SEX)
```

Female   Male 
     8      8 
```

``` r
# 二维交叉表

```

```
             
              Female Male
  Treatment A      4    4
  Treatment B      4    4
```
]
.panel[.panel-name[比例表]

``` r
# margin=1：按行求比例（行是 ARM，列是 SEX）
prop.table(table(adsl$ARM, adsl$SEX), margin = 1)
```

```

  Treatment A    0.5  0.5
  Treatment B    0.5  0.5
```
.warn-box[
`margin = 1` 按行（ARM）计算比例；`margin = 2` 按列计算比例；不写 `margin` 则按总体计算。  
临床表通常用 `margin = 1`（每个 ARM 组的人数作分母）。
]
]
.panel[.panel-name[n (%) 格式化]

``` r
fmt_n_pct &lt;- function(count, denom, digits = 1) {
  pct &lt;- ifelse(denom == 0, NA_real_, 100 * count / denom)
  paste0(count, " (",
         formatC(pct, format = "f", digits = digits), ")")
}

# 演示
fmt_n_pct(5, 8)   # 5/8 = 62.5%
```

```
[1] "5 (62.5)"
```
]
.panel[.panel-name[分类变量整体汇总]

``` r
cat_summary &lt;- function(data, var, arm_var = "ARM") {
  tab   &lt;- table(data[[arm_var]], data[[var]])
  denom &lt;- rowSums(tab)
  out   &lt;- as.data.frame.matrix(tab)
  for (lv in names(out))
    out[[lv]] &lt;- mapply(fmt_n_pct, out[[lv]], denom)
  t(out)
}

cat_summary(adsl, "SEX")
```

```
       Treatment A Treatment B
Female "4 (50.0)"  "4 (50.0)" 
Male   "4 (50.0)"  "4 (50.0)" 
```
]
]

```

.panel[.panel-name[连续变量 section]

``` r
build_cont_section &lt;- function(data, var, label,
                               arm_var = "ARM") {
  xs         &lt;- split(data[[var]], data[[arm_var]])
  stats_list &lt;- lapply(xs, cont_stats_to_rows)
  stat_names &lt;- names(stats_list[[1]])
  out &lt;- data.frame(
    row_label = c(label, paste0("  ", stat_names)),
    stringsAsFactors = FALSE
  )
  for (arm in names(stats_list))
    out[[arm]] &lt;- c("", unname(stats_list[[arm]]))
  out
}

age_section &lt;- build_cont_section(adsl, "AGE", "Age (year)")
age_section
```

```
   row_label Treatment A Treatment B
1 Age (year)                        
2          n           8           8
3       Mean        63.8        63.9
4       S.D.        5.52        6.47
5     Median        63.5        64.0
6     Q1, Q3  60.5, 67.5  59.5, 68.5
7   Min, Max      55, 72      54, 73
```
]
.panel[.panel-name[分类变量 section]

``` r
build_cat_section &lt;- function(data, var, label,
                              arm_var = "ARM") {
  tab        &lt;- table(data[[arm_var]], data[[var]])
  denom      &lt;- rowSums(tab)
  levels_var &lt;- colnames(tab)
  out &lt;- data.frame(
    row_label = c(label, paste0("  ", levels_var)),
    stringsAsFactors = FALSE
  )
  for (i in seq_len(nrow(tab))) {
    arm_name    &lt;- rownames(tab)[i]
    values      &lt;- mapply(fmt_n_pct, tab[i,], denom[i])
    out[[arm_name]] &lt;- c("", unname(values))
  }
  out
}

sex_section  &lt;- build_cat_section(adsl, "SEX",    "Sex, n (%)")
race_section &lt;- build_cat_section(adsl, "RACE",   "Race, n (%)")
agegr_section&lt;- build_cat_section(adsl, "AGEGR1", "Age group, n (%)")
```
]

# 3.1 rtables 的核心思想

.pull-left[
### 表格引擎三步走

```
① 定义布局 layout
      ↓
② 把数据填进布局
      ↓
③ 生成可打印 / HTML / RTF 的表对象
```

### 关键函数

| 函数 | 作用 |
|---|---|
| `basic_table()` | 初始化布局 |
| `split_cols_by()` | 按列变量拆分列头 |
| `split_rows_by()` | 按行变量生成层级 |
| `analyze()` | 对变量应用分析函数 |
| `build_table()` | 把数据填进布局 |
]

.pull-right[
### 最小骨架


``` r
library(rtables)

lyt &lt;- basic_table(show_colcounts = TRUE) %&gt;%
  split_cols_by("ARM")

tbl &lt;- build_table(lyt, df = adsl)
tbl
```

.tip-box[
`rtables` 负责**表格结构和布局**  
`formatters` 负责**单元格内容怎么显示**  
`tern` 负责**常见临床统计分析函数**
]

.note-box[
与 base R 的区别：  
- base R：先算成对象，再自己拼表  
- rtables：边描述布局，边描述每个区域怎么计算
]
]

---
class: animated, fadeIn

# 3.2 `formatters` 简介

.pull-left[
### 它做什么

1. 把值格式化为显示文本
2. 为 rtables 对象提供 ASCII 渲染能力

### 三个核心概念

**① `rcell()`** — 构造一个表格单元格


``` r
library(formatters)
rcell(12.345, format = "xx.x")
rcell(c(10.2, 18.6), format = "xx.x, xx.x")
```

**② `in_rows()`** — 把多条统计量打包成多行

**③ 格式标签 `format = "..."`**

| 格式标签 | 含义 |
|---|---|
| `"xx.x"` | 保留 1 位小数 |
| `"xx.xx"` | 保留 2 位小数 |
| `"xx (xx.x%)"` | 频数 + 百分比 |
| `"xx.x, xx.x"` | 两值并列 |
]

.pull-right[
### 格式化验证


``` r
formatters::format_value(5.1235,
                         format = "xx.xx")

formatters::format_value(c(1.2355, 2.6789),
                         format = "(xx.xx, xx.xx)")
```

.tip-box[
- base R 出表：格式化靠 `paste()` / `sprintf()` / `formatC()`
- rtables 工作流：格式化交给 `formatters`
]

.green-box[
`formatters` = rtables 的"显示层工具箱"  
很多 rtables 表格的显示效果，本质上就是 `formatters` 在做值的渲染
]
]

---
class: animated, fadeIn

# 3.3 自定义连续变量分析函数


``` r
library(rtables)
library(formatters)

cont_afun &lt;- function(x, .N_col, ...) {
  q &lt;- quantile(x, probs = c(0.25, 0.75), na.rm = TRUE, names = FALSE)
  r &lt;- range(x, na.rm = TRUE)

  in_rows(
    "n"        = rcell(sum(!is.na(x)),           format = "xx"),
    "Mean"     = rcell(mean(x, na.rm = TRUE),     format = "xx.x"),
    "S.D."     = rcell(sd(x, na.rm = TRUE),       format = "xx.xx"),
    "Median"   = rcell(median(x, na.rm = TRUE),   format = "xx.x"),
    "Q1, Q3"   = rcell(q,                         format = "xx.x, xx.x"),
    "Min, Max" = rcell(r,                          format = "xx, xx")
  )
}

lyt_age &lt;- basic_table(show_colcounts = TRUE) %&gt;%
  split_cols_by("ARM") %&gt;%
* analyze("AGE", afun = cont_afun, var_labels = "Age (year)")

tbl_age &lt;- build_table(lyt_age, adsl)
tbl_age
```

.note-box[`afun` = 给变量的分析函数；`in_rows()` = 返回多行；`rcell()` = 单元格内容 + 显示格式]

---
class: animated, fadeIn

# 3.4 tern：`analyze_vars()` 连续变量


``` r
library(tern)

lyt_tern_cont &lt;- basic_table(show_colcounts = TRUE) %&gt;%
  split_cols_by("ARM") %&gt;%
  analyze_vars(
    vars    = "AGE",
    .stats  = c("n", "mean_sd", "median",
*               "quantiles", "range"),
    .labels = c(
      n          = "n",
      mean_sd    = "Mean (SD)",
      median     = "Median",
      quantiles  = "Q1 - Q3",
      range      = "Min - Max"
    ),
    .formats = c(
      mean_sd   = "xx.x (xx.xx)",
      quantiles = "xx.x - xx.x",
      range     = "xx - xx"
    )
  )

tbl_tern_cont &lt;- build_table(lyt_tern_cont, adsl)
tbl_tern_cont
```

.tip-box[`analyze_vars()` 的 `.stats` 可选值：`n` `mean` `sd` `mean_sd` `median` `quantiles` `iqr` `range` `min` `max`]

---
class: animated, fadeIn

# 3.5 tern：分类变量 `analyze_vars()`

.pull-left[
### 场景一：分类变量分布


``` r
adsl2 &lt;- adsl %&gt;%
  mutate(
    SEX    = factor(SEX),
    RACE   = factor(RACE),
    AGEGR1 = factor(AGEGR1)
  )

lyt_tern_cat &lt;- basic_table(
    show_colcounts = TRUE) %&gt;%
  split_cols_by("ARM") %&gt;%
  analyze_vars(
    vars    = c("AGEGR1", "SEX", "RACE"),
*   .stats  = c("count_fraction_fixed_dp")
  )

tbl_tern_cat &lt;- build_table(
  lyt_tern_cat, adsl2)
tbl_tern_cat
```

.note-box[
对因子型变量，`analyze_vars()` 自动给出各 level 的 `n (%)`。  
**务必先把分类变量转成 `factor`！** 尤其当 level 顺序有业务要求时。
]
]

.pull-right[
### 场景二：`count_occurrences()` 事件表

适用于**一人多条记录**（AE、MH、CM）且需要按受试者去重统计 occurrence：


``` r
lyt_occ &lt;- basic_table() %&gt;%
  split_cols_by("ARM") %&gt;%
  add_colcounts() %&gt;%
* count_occurrences(
    vars   = "MHDECOD",
    .stats = "count_fraction_fixed_dp"
  )

tbl_occ &lt;- build_table(
  lyt_occ, mh,
* alt_counts_df = adsl_count
)
tbl_occ
```

.warn-box[
`alt_counts_df`：让列头 N 来自 ADSL，  
不是来自明细事件表——这是高频错误来源！
]
]

# 3.6 base R vs rtables / tern 对比

| 维度 | base R | rtables / tern |
|---|---|---|
| 学习门槛 | 低，语法通用 | 初期抽象，需理解 layout 思维 |
| 算法透明度 | 高 | 中（很多功能封装好了） |
| 临床表复用性 | 一般 | 高 |
| 版式控制 | 需自己处理 | 适合复杂层级表 |
| 生存分析扩展 | 要搭更多代码 | 有现成函数入口 |
| 适合场景 | 教学 / 调试 / 高度定制 | 生产 / 标准化 / 团队复用 |

.green-box[
**教学建议**：先 base R 理解算法 → 再 rtables/tern 提效  
只有先知道每一行怎么算，后面用框架才不会变成"只会抄模板"
]

# 4.4 RTF：`r2rtf` 语法骨架

### r2rtf 的核心思想："先准备数据，再一层层加表格属性"


``` r
library(r2rtf)

demo_table_base %&gt;%
  rtf_page(orientation = "landscape",    # ① 页面
           width = 11, height = 8.5) %&gt;%
  rtf_title(                             # ② 标题
    title       = c("Table 14.1.2.1.1",
                    "Demographics (Full Analysis Set)"),
    text_format = c("b", "")
  ) %&gt;%
  rtf_colheader(                         # ③ 列头
    colheader     = paste("Characteristic",
                          "Treatment A (N=8)",
                          "Treatment B (N=8)", sep=" | "),
    col_rel_width = c(3, 2, 2)
  ) %&gt;%
  rtf_body(                              # ④ 表体
    col_rel_width      = c(3, 2, 2),
    text_justification = c("l", "c", "c")
  ) %&gt;%
  rtf_footnote(footnote = c(             # ⑤ 脚注
    "N = number of subjects in each treatment group.",
    "Percentages are based on column denominator."
  ), as_table = FALSE) %&gt;%
  rtf_source(source = "[datasource: ADSL]",
             as_table = FALSE) %&gt;%
  rtf_encode() %&gt;%                       # ⑥ 编码
  write_rtf("demographics_base.rtf")    # ⑦ 写出
```

# 4.5 `r2rtf` 高频参数详解

.panelset[
.panel[.panel-name[col_rel_width]

``` r
rtf_body(col_rel_width = c(3, 2, 2))
```

- 相对宽度比例，不是绝对像素
- 第一列（row label）通常设更大
- `rtf_colheader()` 和 `rtf_body()` 的列宽**必须保持一致**

.warn-box[列宽不一致会导致列头和表体错位！]
]
.panel[.panel-name[text_justification]

``` r
rtf_body(text_justification = c("l", "c", "c"))
```

| 值 | 对齐方式 |
|---|---|
| `"l"` | 左对齐（适合 row label） |
| `"c"` | 居中（适合数值列） |
| `"r"` | 右对齐 |

]
.panel[.panel-name[text_format]

``` r
rtf_title(text_format = c("b", ""))
rtf_body(text_format  = c("b", "", ""))
```

| 值 | 样式 |
|---|---|
| `"b"` | 加粗 |
| `"i"` | 斜体 |
| `"u"` | 下划线 |
| `"ub"` | 下划线 + 加粗 |

]
.panel[.panel-name[r2rtf 易错点]
.warn-box[
1. `r2rtf` 适合处理**已经整理好的 data.frame**，不是拿来做统计的
2. `rtf_colheader()` 与 `rtf_body()` 的 `col_rel_width` 必须一致
3. 第一列通常要更宽，否则 row label 会换行
4. 含中文、希腊字母、上标脚注编号时，提前用 `utf8Tortf()` 验证
5. 团队已有封装函数时应**优先复用**，不要每张表从头手写
]
]
]

# § 5
# Survival Analysis 怎么出？

.section-num[5]

.footnote[[↑ 返回目录](#toc)]

---
class: animated, fadeIn

# 5.1 生存分析的场景

.pull-left[
### 临床项目中常见的 time-to-event 终点

- **OS** — Overall Survival
- **PFS** — Progression-Free Survival
- **DoR** — Duration of Response
- **TTR** — Time to Response

### 核心包：`survival`

| 函数 | 作用 |
|---|---|
| `Surv()` | 构造生存对象 |
| `survfit()` | Kaplan-Meier 拟合 |
| `coxph()` | Cox 比例风险模型 |
]

.pull-right[
### 关系层次

```
survival        ← 底层建模
    ↓
tern::surv_time()  ← 贴近 TFL 的上层接口
    ↓
rtables         ← 表格框架
    ↓
formatters / r2rtf  ← 输出
```

.warn-box[
**在调用任何生存分析函数之前，先确认：**  
- `is_event` 的事件定义是否按分析口径
- 时间变量是否已转成正确单位（月/天）
- 删失规则是否与 SAP 一致
这些直接影响 survival summary 的结果！
]
]

---
class: animated, fadeIn

# 5.2 `survival` 基础语法

.pull-left[
### Kaplan-Meier


``` r
library(survival)

# AVAL：时间变量；is_event：事件标记
km_fit &lt;- survfit(
  Surv(AVAL, is_event) ~ ARM,
  data = adsl
)
summary(km_fit)
```

### Cox 比例风险模型


``` r
cox_fit &lt;- coxph(
  Surv(AVAL, is_event) ~ ARM + AGE + SEX,
  data = adsl
)
summary(cox_fit)
```

Cox 模型可直接引出：
- Hazard Ratio（HR）
- 95% CI
- p-value
]

.pull-right[
### KM 图：`survminer`（可点到为止）


``` r
library(survminer)

ggsurvplot(
  km_fit,
  data       = adsl,
  risk.table = TRUE,
  pval       = TRUE
)
```

.tip-box[
`survminer::ggsurvplot()` 适合展示 KM 曲线 + 风险表 + p 值，是临床 KM 图最常用的绘图工具。本章重点仍在表格输出，图形部分点到为止。
]
]

---
class: animated, fadeIn

# 5.3 `tern::surv_time()` — 临床表接口

.pull-left[
### 基础用法


``` r
library(tern)

lyt_surv &lt;- basic_table(
    show_colcounts = TRUE) %&gt;%
  split_cols_by("ARM") %&gt;%
* surv_time(
    vars      = "AVAL",
    var_labels = "Overall Survival (Months)",
    is_event  = "is_event",
    .stats    = c("median",
                  "median_ci",
                  "quantiles",
                  "range")
  )

tbl_surv &lt;- build_table(lyt_surv, adsl)
tbl_surv
```
]

.pull-right[
### 参数说明

| 参数 | 说明 |
|---|---|
| `vars` | 时间变量 |
| `is_event` | 事件标记变量 |
| `var_labels` | 表里显示的行标题 |
| `.stats` | 展示哪些统计量 |
| `control_surv_time()` | 置信区间、分位数细节 |

### 控制 CI 方法


``` r
lyt_surv2 &lt;- basic_table(
    show_colcounts = TRUE) %&gt;%
  split_cols_by("ARM") %&gt;%
  surv_time(
    vars     = "AVAL",
    is_event = "is_event",
    control  = control_surv_time(
      conf_level = 0.95,
*     conf_type  = "log-log"
    )
  )
```
]

---
class: animated, fadeIn

survival 分析结果同样可以沿用前面的输出路径：

.panel[.panel-name[RTF（推荐路径）]

```
.tip-box[生存分析表通常列较多，建议 `landscape = TRUE`。]
]
.panel[.panel-name[Word]

ft_surv &lt;- rtables::tt_to_flextable(tbl_surv) %&gt;%

doc &lt;- officer::read_docx() %&gt;%
  officer::body_add_par("Overall Survival",
                        style = "heading 1") %&gt;%
  officer::body_add_flextable(value = ft_surv)

print(doc, target = "os_table.docx")
```
